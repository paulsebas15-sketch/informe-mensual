<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informe Mensual — A&V Administraciones</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --P1:#064e3b;--P2:#043a2b;--P3:#059669;--P4:#a7f3d0;--P5:#ecfdf5;
  --bg:#f0f4f2;--card:#fff;--border:#d4e4d9;
  --text:#0f2419;--text-muted:#5a7268;--text-faint:#a0b8ad;
  --shadow:0 2px 12px rgba(0,0,0,.07);--radius:10px;
  --LBLU:#a7f3d0;
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;-webkit-tap-highlight-color:transparent}

.app-header{background:var(--P1);padding:0 14px;position:sticky;top:0;z-index:60;box-shadow:0 2px 16px rgba(0,0,0,.3);display:flex;align-items:center;gap:10px;min-height:58px}
.header-logos{display:flex;align-items:center;gap:8px;flex-shrink:0}
.header-logo{width:34px;height:34px;border-radius:6px;object-fit:contain;background:rgba(255,255,255,.15);padding:2px}
.header-logo-placeholder{width:34px;height:34px;border-radius:6px;background:rgba(255,255,255,.12);border:1.5px dashed rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;font-size:.6rem;color:rgba(255,255,255,.5);text-align:center;line-height:1.1;cursor:pointer;flex-shrink:0}
.header-divider{width:1px;height:28px;background:rgba(255,255,255,.2);flex-shrink:0}
.header-text{flex:1;min-width:0}
.header-text h1{font-size:.9rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-text .sub{font-size:.68rem;color:var(--LBLU);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'DM Mono',monospace}

.tabs{background:var(--P2);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:58px;z-index:50}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 13px;cursor:pointer;white-space:nowrap;font-size:.71rem;font-weight:600;color:rgba(255,255,255,.45);border-bottom:2px solid transparent;transition:all .2s;flex-shrink:0;letter-spacing:.01em;user-select:none}
.tab:hover{color:rgba(255,255,255,.8)}
.tab.active{color:#fff;border-bottom-color:#fff}
.tab.filled{color:var(--LBLU)}
.tab.active.filled{color:#fff;border-bottom-color:var(--LBLU)}
.tab.filled .dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#4ade80;margin-left:4px;vertical-align:middle;margin-bottom:1px}
.dot{display:none}

.main{max-width:700px;margin:18px auto;padding:0 12px}

.card{background:var(--card);border-radius:var(--radius);padding:18px 16px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--border)}
.card-title{font-size:.88rem;font-weight:700;color:var(--P1);margin-bottom:14px;padding-bottom:11px;border-bottom:1.5px solid var(--P5);display:flex;align-items:center;gap:8px}
.card-icon{width:28px;height:28px;background:var(--P1);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}

.fg{margin-bottom:12px}.fg:last-child{margin-bottom:0}
label{display:block;font-size:.72rem;font-weight:600;color:var(--text-muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
input[type=text],input[type=number],select,textarea{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.87rem;color:var(--text);background:#fff;transition:border-color .18s,box-shadow .18s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--P3);box-shadow:0 0 0 3px rgba(5,150,105,.12)}
textarea{resize:vertical;min-height:88px;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

.mes-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:2px}
.mes-opt{padding:9px 4px;border:1.5px solid var(--border);border-radius:8px;text-align:center;cursor:pointer;font-size:.75rem;font-weight:600;color:var(--text-muted);background:#fff;transition:all .18s;user-select:none}
.mes-opt:hover{border-color:var(--P3);color:var(--P3)}
.mes-opt.sel{border-color:var(--P1);background:var(--P1);color:#fff}

.logo-upload-box{border:2px dashed var(--border);border-radius:9px;padding:16px;text-align:center;cursor:pointer;background:#fafcfb;transition:all .18s;position:relative;overflow:hidden}
.logo-upload-box:hover{border-color:var(--P3);background:var(--P5)}
.logo-upload-box input{display:none}
.logo-upload-box p{font-size:.75rem;color:var(--text-muted);margin-top:5px}
.logo-preview{max-height:64px;max-width:100%;object-fit:contain;border-radius:4px}
.logo-rm{position:absolute;top:5px;right:5px;background:rgba(180,20,20,.8);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}

.paletas{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:2px}
@media(min-width:520px){.paletas{grid-template-columns:repeat(3,1fr)}}
.paleta-card{border:2px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .2s;user-select:none}
.paleta-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.12)}
.paleta-card.sel{border-color:var(--P1);box-shadow:0 0 0 3px rgba(5,150,105,.25)}
.paleta-strip{height:38px;display:flex}
.paleta-strip div{flex:1}
.paleta-name{font-size:.7rem;font-weight:700;padding:6px 8px;color:var(--text);background:#fff}
.paleta-card.sel .paleta-name{background:var(--P5);color:var(--P1)}
.paleta-check{display:none;float:right;color:var(--P1)}
.paleta-card.sel .paleta-check{display:inline}

.preview-wrap{margin-top:4px;border-radius:10px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.slide-preview{position:relative;width:100%;aspect-ratio:16/9;font-family:'Calibri',sans-serif;overflow:hidden;background:#fff}
.preview-tabs{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.ptab{font-size:.7rem;padding:4px 10px;border-radius:6px;cursor:pointer;border:1.5px solid var(--border);color:var(--text-muted);background:#fff;transition:all .15s;font-weight:600}
.ptab.active{background:var(--P1);color:#fff;border-color:var(--P1)}

.btn{padding:9px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.83rem;font-weight:700;transition:all .18s;display:inline-flex;align-items:center;gap:6px;user-select:none}
.btn-primary{background:var(--P1);color:#fff}.btn-primary:hover{background:var(--P2)}
.btn-success{background:#16a34a;color:#fff}.btn-success:hover{background:#15803d}
.btn-danger{background:#dc2626;color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-outline{background:transparent;border:1.5px solid var(--P1);color:var(--P1)}.btn-outline:hover{background:var(--P1);color:#fff}
.btn-ghost{background:#e7f0eb;color:var(--P1);border:1.5px solid var(--border)}.btn-ghost:hover{background:#d4e8db}
.btn-sm{padding:5px 11px;font-size:.75rem}
.btn-block{width:100%;justify-content:center}

.item-block{background:#f5faf7;border:1.5px solid #d0e8d8;border-radius:9px;padding:14px;margin-bottom:10px}
.item-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.item-label{font-size:.7rem;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em}

.photo-zone{border:2px dashed #b0cec0;border-radius:8px;padding:14px 12px;text-align:center;cursor:pointer;background:#fafcfb;transition:all .18s;margin-top:4px}
.photo-zone:hover{border-color:var(--P3);background:var(--P5)}
.photo-zone input{display:none}
.photo-zone p{font-size:.78rem;color:var(--text-muted);margin:0}
.photo-zone .pz-icon{font-size:1.3rem;margin-bottom:4px}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(82px,1fr));gap:7px;margin-top:10px}
.photo-item{position:relative;aspect-ratio:1;border-radius:7px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.12)}
.photo-item img{width:100%;height:100%;object-fit:cover;display:block}
.photo-item .rm{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:50%;width:19px;height:19px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0 2px}
.stat-box{background:var(--P5);border:1.5px solid #c6e4d0;border-radius:9px;padding:12px 10px;text-align:center}
.stat-box .slabel{font-size:.65rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
.stat-box .samount{font-size:1.02rem;font-weight:700;color:var(--P1);margin-top:4px;word-break:break-all;font-family:'DM Mono',monospace}
.stat-box.accent{background:var(--P1);border-color:var(--P1)}
.stat-box.accent .slabel{color:#a7f3d0}
.stat-box.accent .samount{color:#fff}
.stat-box.gastos{background:#065f46;border-color:#065f46}
.stat-box.gastos .slabel{color:#a7f3d0}
.stat-box.gastos .samount{color:#fff}

.action-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:10px 16px;display:flex;gap:8px;justify-content:center;box-shadow:0 -3px 18px rgba(0,0,0,.1);z-index:100;border-top:1px solid var(--border)}

.overlay{display:none;position:fixed;inset:0;background:rgba(8,20,40,.55);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:14px;padding:26px 22px;max-width:360px;width:90%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.modal h3{margin-bottom:8px;font-size:1rem;color:var(--text)}
.modal p{color:var(--text-muted);font-size:.82rem;margin-bottom:20px;line-height:1.55}
.modal-btns{display:flex;gap:8px;justify-content:center}

.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--P3);color:#fff;padding:9px 18px;border-radius:24px;font-size:.82rem;font-weight:600;z-index:300;opacity:0;transition:opacity .25s;white-space:nowrap;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.show{opacity:1}
.hint{font-size:.75rem;color:var(--text-muted);margin:-10px 0 12px;line-height:1.5}

@media(max-width:540px){
  .row2{grid-template-columns:1fr}
  .row3{grid-template-columns:1fr}
  .stat-row{grid-template-columns:1fr}
  .action-bar{gap:6px}
  .btn{padding:9px 10px;font-size:.78rem}
  .mes-grid{grid-template-columns:repeat(3,1fr)}
  .paletas{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div class="app-header" id="app-header">
  <div class="header-logos" id="header-logos"></div>
  <div class="header-divider" id="header-divider" style="display:none"></div>
  <div class="header-text">
    <h1>Informe Mensual</h1>
    <div class="sub" id="header-sub">A&V Administraciones</div>
  </div>
</div>
<div class="tabs" id="tabs"></div>
<div class="main" id="content"></div>

<div class="action-bar">
  <button class="btn btn-ghost" onclick="showReset()">🔄 Reiniciar</button>
  <button class="btn btn-outline" onclick="saveData()">💾 Guardar</button>
  <button class="btn btn-success" onclick="generatePPT()">⬇️ Descargar PPT</button>
</div>

<div class="overlay" id="modal-overlay">
  <div class="modal">
    <h3>⚠️ Reiniciar informe</h3>
    <p>Se borrará todo el contenido actual incluyendo fotos y logos. Esta acción no se puede deshacer.</p>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-danger" onclick="doReset()">Sí, reiniciar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ── STORAGE (IndexedDB — sin límite de localStorage) ──
const DB_NAME='InformeMensualDB', DB_STORE='state', DB_KEY='report';
let _idb=null;
function _openDB(){
  return new Promise((ok,fail)=>{
    if(_idb){ok(_idb);return;}
    const r=indexedDB.open(DB_NAME,1);
    r.onupgradeneeded=e=>e.target.result.createObjectStore(DB_STORE);
    r.onsuccess=e=>{_idb=e.target.result;ok(_idb);};
    r.onerror=fail;
  });
}
async function saveData(silent=false){
  try{
    const d=await _openDB();
    const tx=d.transaction(DB_STORE,'readwrite');
    tx.objectStore(DB_STORE).put(JSON.stringify(state),DB_KEY);
    await new Promise((ok,fail)=>{tx.oncomplete=ok;tx.onerror=fail;});
    if(!silent) showToast('💾 Guardado');
  }catch(e){ showToast('⚠️ Error al guardar',true); }
}
async function loadData(){
  try{
    const d=await _openDB();
    const tx=d.transaction(DB_STORE,'readonly');
    const req=tx.objectStore(DB_STORE).get(DB_KEY);
    const r=await new Promise((ok,fail)=>{req.onsuccess=()=>ok(req.result);req.onerror=fail;});
    if(r){ const p=JSON.parse(r); state=Object.assign(mkState(),p);
      if(!state.cronograma) state.cronograma={items:[],fotos:[]};
      if(!state.cronograma.fotos) state.cronograma.fotos=[];
      if(!state.portada.fotoPortada) state.portada.fotoPortada='';
    }
  }catch(e){ state=mkState(); }
}
function autoSave(){ clearTimeout(saveTimer); saveTimer=setTimeout(()=>{saveData(true);},700); }
async function doReset(){ state=mkState(); try{ const d=await _openDB(); const tx=d.transaction(DB_STORE,'readwrite'); tx.objectStore(DB_STORE).delete(DB_KEY); }catch(e){} closeModal(); activeTab='portada'; renderAll(); showToast('🔄 Informe reiniciado'); }

// ── PALETA helper ──
function pal(){ return PALETAS.find(p=>p.id===state.tema)||PALETAS[0]; }
function applyTheme(){
  const p=pal();
  document.documentElement.style.setProperty('--P1','#'+p.p1);
  document.documentElement.style.setProperty('--P2','#'+p.p2);
  document.documentElement.style.setProperty('--P3','#'+p.p3);
  document.documentElement.style.setProperty('--P4','#'+p.acc);
  document.documentElement.style.setProperty('--P5','#'+p.bg);
  document.documentElement.style.setProperty('--LBLU','#'+p.acc);
  document.documentElement.style.setProperty('--bg',  '#'+p.bg);
  document.documentElement.style.setProperty('--border','#c6d9cc');
}

// ── FOTOS ──
function compressImage(file, maxDim){
  maxDim = maxDim || 1100;
  return new Promise(res=>{
    const reader=new FileReader();
    reader.onload=e=>{ const img=new Image(); img.onload=()=>{
      const MAX=maxDim; let w=img.width,h=img.height;
      if(w>MAX||h>MAX){ if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h); res(c.toDataURL('image/jpeg',.78));
    }; img.src=e.target.result; }; reader.readAsDataURL(file);
  });
}
async function handlePhotos(files,section,idx,field){
  for(const file of Array.from(files)){
    if(!file.type.startsWith('image/')) continue;
    const b64=await compressImage(file);
    if(idx!==null){ if(!state[section][idx][field]) state[section][idx][field]=[]; state[section][idx][field].push(b64); }
    else{ if(!state[section][field]) state[section][field]=[]; state[section][field].push(b64); }
  }
  autoSave(); renderSection(activeTab);
}
function removePhoto(section,idx,field,pi){
  if(idx!==null) state[section][idx][field].splice(pi,1);
  else           state[section][field].splice(pi,1);
  autoSave(); renderSection(activeTab);
}
function photoZoneHTML(inputId,section,idx,field){
  const fotos=idx!==null?(state[section][idx][field]||[]):(state[section][field]||[]);
  const rmCall=idx!==null?`removePhoto('${section}',${idx},'${field}',I)`:`removePhoto('${section}',null,'${field}',I)`;
  const upCall=idx!==null?`handlePhotos(this.files,'${section}',${idx},'${field}')`:`handlePhotos(this.files,'${section}',null,'${field}')`;
  const thumbs=fotos.map((f,i)=>`<div class="photo-item"><img src="${f}" alt="foto ${i+1}"><button class="rm" onclick="${rmCall.replace('I',i)}" title="Eliminar">✕</button></div>`).join('');
  return `<div class="photo-zone" onclick="document.getElementById('${inputId}').click()">
    <input type="file" id="${inputId}" accept="image/*" multiple onchange="${upCall}">
    <div class="pz-icon">📸</div><p>Toca para subir fotos</p></div>
    ${fotos.length?`<div class="photo-grid">${thumbs}</div>`:''}`;
}
async function handleLogo(file,field){
  if(!file||!file.type.startsWith('image/')) return;
  const b64=await compressImage(file,500);
  state.portada[field]=b64; autoSave(); renderHeader(); renderSection('portada');
}
async function handleCoverPhoto(file){
  if(!file||!file.type.startsWith('image/')) return;
  const b64=await compressImage(file,1400);
  state.portada.fotoPortada=b64; autoSave(); renderSection('portada');

async function handleProvLogo(file,idx){
  if(!file||!file.type.startsWith('image/')) return;

  state.mantenimientos[idx].logoProveedor=b64; autoSave(); renderSection('mantenimientos');
}

function hex(h){ return h.startsWith('#')?h.slice(1):h; }

async function loadPptxLibrary(){
  if(typeof PptxGenJS!=='undefined') return true;
  const cdns=[
    'https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js',
    'https://unpkg.com/pptxgenjs@3.12.0/dist/pptxgen.bundle.js',
    'https://cdnjs.cloudflare.com/ajax/libs/pptxgenjs/3.12.0/pptxgen.bundle.js'
  ];
  for(const src of cdns){
    try{
      await new Promise((ok,fail)=>{const s=document.createElement('script');s.src=src;s.onload=ok;s.onerror=fail;document.head.appendChild(s);});
      if(typeof PptxGenJS!=='undefined') return true;
    }catch(e){continue;}
  }
  return false;
}

function mkSlide(pptx,title,sub=''){
  const pa=pal(); const P1=hex(pa.p1), ACC=hex(pa.acc), s=state;
  const sl=pptx.addSlide();
  sl.addShape(pptx.ShapeType.rect,{x:0,y:0,w:'100%',h:1.3,fill:{color:P1},line:{color:P1}});
  sl.addText((s.portada.empresa||'A&V ADMINISTRACIONES').toUpperCase(),{x:.35,y:.07,w:12.5,h:.28,fontSize:8,color:ACC,fontFace:'Calibri'});
  sl.addText(title.toUpperCase(),{x:.35,y:.3,w:11.8,h:.7,fontSize:21,bold:true,color:'FFFFFF',fontFace:'Calibri',charSpacing:.3,wrap:true});
  if(sub) sl.addText(sub,{x:.35,y:.97,w:11.8,h:.3,fontSize:11,color:ACC,fontFace:'Calibri'});
  const logoSrc=s.portada.logoConjunto;
  if(logoSrc){ try{ sl.addImage({data:logoSrc,x:11.95,y:.18,w:1.05,h:.95,sizing:{type:'contain',w:1.05,h:.95}}); }catch(e){} }
  return sl;
}

function addPhotos(sl,fotos,y0){
  if(!fotos||!fotos.length) return;
  const n=Math.min(fotos.length,4), m=.15;
  const h=7.5-y0-.15;
  if(n===1){ const w=10,x=(13.33-w)/2; try{sl.addImage({data:fotos[0],x,y:y0+.05,w,h,sizing:{type:'contain',w,h}});}catch(e){} }
  else if(n===2){ const w=(13.33-3*m)/2; [0,1].forEach(i=>{try{sl.addImage({data:fotos[i],x:m+i*(w+m),y:y0+.05,w,h,sizing:{type:'contain',w,h}});}catch(e){}}); }
  else if(n===3){ const w=(13.33-4*m)/3; [0,1,2].forEach(i=>{try{sl.addImage({data:fotos[i],x:m+i*(w+m),y:y0+.05,w,h,sizing:{type:'contain',w,h}});}catch(e){}}); }
  else{ const w=(13.33-3*m)/2,hh=(h-m)/2; [[0,m,y0+.05],[1,m*2+w,y0+.05],[2,m,y0+.05+hh+m],[3,m*2+w,y0+.05+hh+m]].forEach(([i,x,y])=>{try{sl.addImage({data:fotos[i],x,y,w,h:hh,sizing:{type:'contain',w,h:hh}});}catch(e){}}); }
}

function addPhotosRight(sl,fotos,x0,y0,w,h){
  if(!fotos||!fotos.length) return;
  const n=Math.min(fotos.length,4),m=.12;
  if(n===1){ try{sl.addImage({data:fotos[0],x:x0,y:y0+.05,w,h:h-.1,sizing:{type:'contain',w,h:h-.1}});}catch(e){} }
  else if(n===2){ const ph=(h-3*m)/2; [0,1].forEach(i=>{try{sl.addImage({data:fotos[i],x:x0,y:y0+m+i*(ph+m),w,h:ph,sizing:{type:'contain',w,h:ph}});}catch(e){}});}
  else if(n===3){ const pw=(w-m)/2,ph=(h-3*m)/2;
    [[0,x0,y0+m,pw,ph],[1,x0+pw+m,y0+m,pw,ph],[2,x0,y0+2*m+ph,w,ph]].forEach(([i,x,y,cw,ch])=>{try{sl.addImage({data:fotos[i],x,y,w:cw,h:ch,sizing:{type:'contain',w:cw,h:ch}});}catch(e){}});}
  else{ const pw=(w-m)/2,ph=(h-3*m)/2;
    [[0,x0,y0+m,pw,ph],[1,x0+pw+m,y0+m,pw,ph],[2,x0,y0+2*m+ph,pw,ph],[3,x0+pw+m,y0+2*m+ph,pw,ph]].forEach(([i,x,y,cw,ch])=>{try{sl.addImage({data:fotos[i],x,y,w:cw,h:ch,sizing:{type:'contain',w:cw,h:ch}});}catch(e){}});}
}

function contentSlide(pptx,title,sub,text,fotos,logoExtra){
  const hasT=!!(text&&text.trim()),hasP=!!(fotos&&fotos.length);
  const sl=mkSlide(pptx,title,sub);
  const bY=1.32,bH=7.5-bY-.1,m=.3;
  if(logoExtra){ try{ sl.addImage({data:logoExtra,x:10.6,y:1.32,w:1.5,h:.85,sizing:{type:'contain',w:1.5,h:.85}}); }catch(e){} }
  if(hasT&&hasP){
    const colW=(13.33-3*m)/2, photoX=m*2+colW;
    sl.addText(text,{x:m,y:bY,w:colW,h:bH,fontSize:24,color:'18293d',fontFace:'Calibri',wrap:true,valign:'middle'});
    addPhotosRight(sl,fotos.slice(0,4),photoX,bY,colW,bH);
    if(fotos.length>4){const s2=mkSlide(pptx,title,'Fotos — continuación');addPhotosRight(s2,fotos.slice(4,8),photoX,bY,colW,bH);}
  } else if(hasT){
    sl.addText(text,{x:m,y:bY,w:13.33-2*m,h:bH,fontSize:24,color:'18293d',fontFace:'Calibri',wrap:true,valign:'middle'});
  } else if(hasP){
    addPhotos(sl,fotos.slice(0,4),bY);
    if(fotos.length>4){const s2=mkSlide(pptx,title,'Fotos — continuación');addPhotos(s2,fotos.slice(4,8),bY);}
  }
}

async function generatePPT(){
  showToast('⏳ Cargando librería PPT...');
  const pptxOk = await loadPptxLibrary();
  if(!pptxOk){showToast('⚠️ Error al cargar la librería PPT. Verifica tu conexión a internet.',true);return;}
  const s=state;
  if(!s.portada.conjunto||!s.portada.mes){showToast('⚠️ Completa la Portada primero',true);switchTab('portada');return;}
  showToast('⏳ Generando PPT...');
  try{
    const pa=pal();
    const pptx=new PptxGenJS();
    pptx.layout='LAYOUT_WIDE';
    pptx.author=s.portada.empresa||'A&V Administraciones';
    pptx.subject=`Informe de Gestión — ${s.portada.mes} ${s.portada.anio}`;

    // ── PORTADA — diseño aprobado: diagonal con foto + barra inferior ──
    {
      const sl=pptx.addSlide();
      const P1=hex(pa.p1),P3=hex(pa.p3);
      sl.background={color:'FFFFFF'};

      // Foto diagonal (clip simulado con imagen rectangular + borde grueso encima)
      if(s.portada.fotoPortada){
        try{ sl.addImage({data:s.portada.fotoPortada,x:7.6,y:0,w:5.73,h:5.0,sizing:{type:'cover',w:5.73,h:5.0}}); }catch(e){}
      } else {
        sl.addShape(pptx.ShapeType.rect,{x:7.6,y:0,w:5.73,h:5.0,fill:{color:'CFE3DA'},line:{color:'CFE3DA'}});
      }
      // Diagonal mask triangles to fake the cut corners (top-left and bottom-left of photo block)
      sl.addShape(pptx.ShapeType.rightTriangle,{x:7.6,y:0,w:1.55,h:1.55,fill:{color:'FFFFFF'},line:{color:'FFFFFF'},rotate:0,flipH:true});
      sl.addShape(pptx.ShapeType.rightTriangle,{x:7.6,y:3.45,w:2.45,h:1.55,fill:{color:'FFFFFF'},line:{color:'FFFFFF'},rotate:0,flipV:true,flipH:true});
      // Green diagonal border frame
      sl.addShape(pptx.ShapeType.rect,{x:7.6,y:0,w:5.73,h:5.0,fill:{type:'none'},line:{color:P3,width:3}});

      // top-right accent triangle
      sl.addShape(pptx.ShapeType.triangle,{x:11.6,y:0,w:.73,h:.73,fill:{color:P3},line:{color:P3},rotate:0,flipV:true});

      // bottom triangles
      sl.addShape(pptx.ShapeType.triangle,{x:0,y:6.0,w:.65,h:.5,fill:{color:P1},line:{color:P1},flipV:true});
      sl.addShape(pptx.ShapeType.triangle,{x:7.0,y:6.0,w:.9,h:.78,fill:{color:P1},line:{color:P1},flipV:true});
      sl.addShape(pptx.ShapeType.triangle,{x:8.45,y:6.0,w:.9,h:.78,fill:{color:P3},line:{color:P3},flipV:true});

      // bottom green bar with company name
      sl.addShape(pptx.ShapeType.rect,{x:0,y:6.0,w:4.6,h:.5,fill:{color:P3},line:{color:P3}});
      sl.addText((s.portada.empresa||'A&V ADMINISTRACIONES').toUpperCase(),{x:.35,y:6.05,w:4,h:.4,fontSize:15,bold:true,color:'FFFFFF',fontFace:'Calibri'});

      // logos top-left
      if(s.portada.logoEmpresa){ try{ sl.addImage({data:s.portada.logoEmpresa,x:.35,y:.2,w:1.5,h:.95,sizing:{type:'contain',w:1.5,h:.95}}); }catch(e){} }
      if(s.portada.logoConjunto){ try{ sl.addImage({data:s.portada.logoConjunto,x:2.0,y:.2,w:1.5,h:.95,sizing:{type:'contain',w:1.5,h:.95}}); }catch(e){} }

      // title
      sl.addText('INFORME DE',{x:.95,y:1.9,w:6.5,h:.9,fontSize:46,bold:true,color:'0F2B22',fontFace:'Calibri'});
      sl.addText('GESTION',{x:.95,y:2.65,w:6.5,h:.9,fontSize:46,bold:true,color:'0F2B22',fontFace:'Calibri'});

      // subtitle
      sl.addText((s.portada.conjunto||'').toUpperCase(),{x:1.0,y:3.75,w:6.2,h:.5,fontSize:19,color:'16312A',fontFace:'Calibri',align:'center'});
      sl.addText(`MES DE ${(s.portada.mes||'').toUpperCase()} ${s.portada.anio}`,{x:1.0,y:4.2,w:6.2,h:.5,fontSize:19,color:'16312A',fontFace:'Calibri',align:'center'});
    }

    // ── FINANCIERO — CIFRAS ──
    {
      const f=s.financiero;
      const ing=parseFloat(f.ingresos||0),adi=parseFloat(f.adicionales||0);
      const gas=parseFloat(f.gastos||0),exc=parseFloat(f.excedentes||0);
      const total=ing+adi,pct=total>0?Math.round((gas/total)*100):0;
      const sl=mkSlide(pptx,'Estados Financieros',`Corte de ${s.portada.mes} ${s.portada.anio}`);
      const bW=3.85,bH=2.6,bY=1.7,gap=.38,totW=3*bW+2*gap,sx=(13.33-totW)/2;
      const boxes=[
        {label:'TOTAL INGRESOS',val:formatCOP(total),sub:adi>0?`Op: ${formatCOP(ing)} | Adic: ${formatCOP(adi)}`:'',clr:hex(pa.p3)},
        {label:`GASTOS TOTALES — ${pct}% DEL INGRESO`, val:formatCOP(gas),  sub:'',clr:'065f46'},
        {label:'EXCEDENTES',     val:formatCOP(exc),  sub:'',clr:hex(pa.p1)},
      ];
      boxes.forEach((b,i)=>{
        const bx=sx+i*(bW+gap);
        sl.addShape(pptx.ShapeType.rect,{x:bx,y:bY,w:bW,h:bH,fill:{color:b.clr},line:{color:b.clr}});
        sl.addText(b.label,{x:bx+.12,y:bY+.2,w:bW-.24,h:.5,fontSize:9,color:'CCEECC',bold:true,fontFace:'Calibri',align:'center',wrap:true});
        sl.addText(b.val,{x:bx+.12,y:bY+.78,w:bW-.24,h:.95,fontSize:22,bold:true,color:'FFFFFF',fontFace:'Calibri',align:'center',wrap:true});
        if(b.sub) sl.addText(b.sub,{x:bx+.12,y:bY+1.85,w:bW-.24,h:.55,fontSize:9.5,color:'C8F0C8',fontFace:'Calibri',align:'center'});
      });
    }

    if(s.financiero.novedades) contentSlide(pptx,'Estados Financieros','Novedades del período',s.financiero.novedades,[]);
    if(s.cartera.descripcion||s.cartera.fotos?.length) contentSlide(pptx,'Cartera','Gestión del período',s.cartera.descripcion,s.cartera.fotos||[]);

    // ── CRONOGRAMA (después de Cartera) ──
    cronogramaSlide(pptx);

    s.mantenimientos.forEach(m=>{
      if(!m.empresa&&!m.descripcion&&!m.fotos.length) return;
      contentSlide(pptx,m.empresa||'Mantenimiento',m.fecha?`Mantenimiento — ${m.fecha}`:'Mantenimiento preventivo',m.descripcion,m.fotos,m.logoProveedor||null);
    });
    s.proyectos.forEach(p=>{ if(!p.nombre&&!p.descripcion&&!p.fotos.length) return; contentSlide(pptx,p.nombre||'Proyecto','',p.descripcion,p.fotos); });
    s.gestiones.forEach(g=>{ if(!g.titulo&&!g.descripcion&&!g.fotos.length) return; contentSlide(pptx,'Gestiones Administrativas',g.titulo||'',g.descripcion,g.fotos); });
    s.extras.forEach(e=>{ if(!e.titulo&&!e.descripcion&&!e.fotos.length) return; contentSlide(pptx,e.titulo||'Gestión adicional','',e.descripcion,e.fotos); });

    if(s.comunicados.fotos.length){
      const sl=mkSlide(pptx,'Comunicados en el mes');
      addPhotos(sl,s.comunicados.fotos.slice(0,4),1.38);
      if(s.comunicados.fotos.length>4){const sl2=mkSlide(pptx,'Comunicados en el mes','Continuación');addPhotos(sl2,s.comunicados.fotos.slice(4,8),1.38);}
    }

    // ── CIERRE ──
    {
      const sl=pptx.addSlide();
      const P1=hex(pa.p1),P2=hex(pa.p2),ACC=hex(pa.acc);
      sl.addShape(pptx.ShapeType.rect,{x:0,y:0,w:'100%',h:'100%',fill:{color:P1},line:{color:P1}});
      sl.addShape(pptx.ShapeType.rect,{x:0,y:5.85,w:'100%',h:1.65,fill:{color:P2},line:{color:P2}});
      const logoSrc=s.portada.logoConjunto;
      if(logoSrc){try{sl.addImage({data:logoSrc,x:5.8,y:.3,w:1.7,h:1.1,sizing:{type:'contain',w:1.7,h:1.1}});}catch(e){}}
      sl.addText('MUCHAS GRACIAS',{x:.5,y:2.4,w:12.3,h:1.2,fontSize:48,bold:true,color:'FFFFFF',fontFace:'Calibri',align:'center'});
      sl.addText((s.portada.empresa||'A&V Administraciones').toUpperCase(),{x:.5,y:3.8,w:12.3,h:.5,fontSize:14,color:ACC,fontFace:'Calibri',align:'center'});
      sl.addText((s.portada.conjunto||'').toUpperCase(),{x:.5,y:6.1,w:12.3,h:.85,fontSize:14,bold:true,color:'FFFFFF',fontFace:'Calibri',align:'center'});
    }

    const mes=s.portada.mes||'Informe';
    const conj=(s.portada.conjunto||'Conjunto').replace(/\s+/g,'_').substring(0,30);
    await pptx.writeFile({fileName:`Informe_${conj}_${mes}_${s.portada.anio}.pptx`});
    showToast('✅ PPT descargado exitosamente');
  }catch(err){ console.error(err); showToast('⚠️ Error al generar: '+err.message,true); }
}

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
(async()=>{ await loadData(); renderAll(); })();
</script>
